<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-books SignIn</title>
    <link rel="icon" type="image/png" href="https://e7.pngegg.com/pngimages/377/149/png-clipart-digital-library-bookmobile-beautiful-illustration-library-gadget-text-thumbnail.png">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: sans-serif;
        }

        
        .page-container {
            display: flex;
            width: 100%;
            height: 100vh; 
        }

       
        .left {
            width: 50%;
            height: 100%;
            overflow: hidden;
        }

        .left img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 20px;

        }
        
        
        .right {
            width: 50%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding-left: 60px; 
            padding-top: 30px;
            box-sizing: border-box; 
        }

       .right h1{
        padding: 0px;
        margin-top: 50px;
        margin-bottom: 20px;
        text-align: center;
        font-size:50px;
        font-weight:bold;
        font-family: Georgia, 'Times New Roman', Times, serif;
       }
       .right h2{
        margin-top: 5px;
        margin-bottom: 30px;
        font-size: 35px;
        text-align: center;
        color: rgb(4, 30, 59);
        font-weight: 650;
        font-family: Verdana, Geneva, Tahoma, sans-serif;
       }
       
       .right label{
        font-size: 20px;
        margin-left: 100px;
       }
       .right form input[type="text"]{
        border-radius: 10px;
        width: 300px;
        height: 30px;
        border: 0.5px solid rgb(3, 3, 44);
       }
         

    .submit_button {
    display: flex;
    justify-content: center;
    margin-top: 20px;
}

.submit_button input[type="submit"] {
    width: 125px;
    height: 40px;
    font-size: 18px;
    border-radius: 10px;
    cursor: pointer;
    background-color: rgb(4, 30, 59);
    color: white;
    border: none;
}
.right p{
    text-align: center;
    font-size: medium;
}
    

    </style>
</head>
<body>

    <!-- Wrapped everything inside a single layout container -->
    <div class="page-container">
        
        <div class="left">
            <img src="https://media.istockphoto.com/id/1498878143/photo/book-stack-and-open-book-on-the-desk-in-modern-public-library.jpg?s=612x612&w=0&k=20&c=vRcxdgfHSFJkow6DNPtaL9DT_ttdMGWel-qRLEzkQEI=" alt="Books">
        </div>
        
        <div class="right">
            <h1>Path to Victory📖</h1>
            <h2>Sign in</h2><br><br>
            <form action="signed_in.html" target="_parent">
                <label>Name</label>
                <input type="text" placeholder="Enter your name" required>
                <br><br>
                <label>Email</label>
                <input type="text" placeholder="Enter your email" required>
                <br><br>
                <div class="submit_button">
                    <input type="submit" value="Sign In">
                </div>
                <p> Already have account?<a href="#">Login In</a></p>

            </form>
        </div>

    </div>

</body>
</html>
